<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PexSite</title>
<meta name="description" content="Interactive educational tools for students">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;overflow:hidden}

/* grid */
#v-grid{display:flex;flex-direction:column;height:100%}
#grid-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#1a1a1a;border-bottom:1px solid #222;flex-shrink:0}
#grid-header h1{font-size:1.1rem;letter-spacing:.5px;cursor:default}
#grid-header h1 span{color:#e85d20}
#search{flex:1;max-width:300px;padding:7px 11px;border-radius:6px;border:1px solid #2a2a2a;background:#1e1e1e;color:#fff;font-size:.86rem;outline:none}
#search:focus{border-color:#e85d20}
.hdr-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .12s;flex-shrink:0}
.hdr-btn:hover{background:#272727;color:#fff}
#cat-bar{display:flex;gap:6px;padding:7px 14px;background:#161616;border-bottom:1px solid #1e1e1e;flex-wrap:wrap;flex-shrink:0}
.cb{padding:4px 11px;border-radius:20px;border:1px solid #2a2a2a;background:#1e1e1e;color:#777;cursor:pointer;font-size:.78rem;transition:all .12s}
.cb:hover,.cb.on{background:#e85d20;border-color:#e85d20;color:#fff}
#count{padding:5px 14px;font-size:.72rem;color:#333;flex-shrink:0}
#grid-wrap{overflow-y:auto;flex:1;padding:10px 14px 20px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px}
.card{background:#1e1e1e;border-radius:7px;padding:11px 9px 8px;cursor:pointer;transition:background .12s,transform .1s;border:1px solid #242424}
.card:hover{background:#272727;transform:translateY(-2px)}
.card .t{font-size:.85rem;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .c{font-size:.66rem;color:#666;text-transform:uppercase;letter-spacing:.4px}
#no-res{display:none;text-align:center;padding:50px 20px;color:#333;font-size:.88rem}

/* player */
#v-player{display:none;flex-direction:column;height:100%}
#p-bar{display:flex;align-items:center;gap:8px;padding:0 12px;background:#141416;border-bottom:1px solid #1f1f22;height:46px;flex-shrink:0}
#p-back{display:inline-flex;align-items:center;gap:5px;background:#1e1e22;border:1px solid #2c2c32;color:#aaa;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:.78rem;white-space:nowrap;transition:all .12s}
#p-back:hover{background:#26262c;color:#fff}
#p-title{font-size:.88rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:#ddd}
#p-fs{display:inline-flex;align-items:center;background:#e85d20;border:none;color:#fff;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:.78rem;font-weight:700;flex-shrink:0}
#p-fs:hover{background:#c94d12}
#p-wrap{position:relative;flex:1;overflow:hidden;background:#000}
#viewFrame{position:absolute;inset:0;width:100%;height:100%;border:none}
#p-load{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0d0f;z-index:10;gap:14px;transition:opacity .3s}
#p-load.off{opacity:0;pointer-events:none}
.ring{width:40px;height:40px;border-radius:50%;border:3px solid #1e1e22;border-top-color:#e85d20;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#p-stat{color:#444;font-size:.78rem}

/* settings modal */
#s-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#s-overlay.on{display:flex}
#s-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:22px 24px;width:340px;max-width:90vw}
#s-box h2{font-size:.95rem;margin-bottom:18px;color:#ddd}
.s-row{margin-bottom:16px}
.s-row label{display:block;font-size:.76rem;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.s-row input[type=text]{width:100%;padding:7px 10px;background:#111;border:1px solid #2a2a2a;border-radius:5px;color:#fff;font-size:.86rem;outline:none}
.s-row input[type=text]:focus{border-color:#e85d20}
.s-toggle{display:flex;align-items:center;gap:10px}
.s-toggle input[type=checkbox]{width:16px;height:16px;accent-color:#e85d20;cursor:pointer}
.s-toggle span{font-size:.82rem;color:#aaa}
.s-hint{font-size:.7rem;color:#444;margin-top:4px}
.s-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.s-btns button{padding:6px 16px;border-radius:5px;font-size:.8rem;cursor:pointer;border:none}
#s-cancel{background:#1e1e1e;color:#888;border:1px solid #2a2a2a}
#s-cancel:hover{background:#272727;color:#fff}
#s-save{background:#e85d20;color:#fff;font-weight:600}
#s-save:hover{background:#c94d12}

/* web explorer */
#v-search{display:none;flex-direction:column;height:100%}
#s2-bar{display:flex;align-items:center;gap:8px;padding:0 12px;background:#141416;border-bottom:1px solid #1f1f22;height:46px;flex-shrink:0}
#s2-back{display:inline-flex;align-items:center;gap:5px;background:#1e1e22;border:1px solid #2c2c32;color:#aaa;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:.78rem;white-space:nowrap;transition:all .12s}
#s2-back:hover{background:#26262c;color:#fff}
#s2-input{flex:1;padding:7px 11px;border-radius:6px;border:1px solid #2a2a2a;background:#1e1e1e;color:#fff;font-size:.86rem;outline:none}
#s2-input:focus{border-color:#e85d20}
#s2-go{background:#e85d20;border:none;color:#fff;padding:5px 16px;border-radius:5px;cursor:pointer;font-size:.8rem;font-weight:700;white-space:nowrap;flex-shrink:0}
#s2-go:hover{background:#c94d12}
#s2-wrap{flex:1;position:relative;overflow:hidden;background:#111}
#s2-frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
#s2-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#333;font-size:.82rem;pointer-events:none}
#s2-hint.off{display:none}
</style>
</head>
<body>

<!-- GRID VIEW -->
<div id="v-grid">
  <div id="grid-header">
    <h1>Pex<span>Site</span></h1>
    <input id="search" type="text" placeholder="Search resources..." autocomplete="off">
    <button class="hdr-btn" onclick="goSearch()" title="Web Explorer" style="color:#e85d20">&#128269;</button>
    <button class="hdr-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  </div>
  <div id="cat-bar">
    <button class="cb on" data-cat="all">All</button>
    <button class="cb" data-cat="math">Math</button>
    <button class="cb" data-cat="science">Science</button>
    <button class="cb" data-cat="social">Social Studies</button>
    <button class="cb" data-cat="health">Health &amp; PE</button>
    <button class="cb" data-cat="language">Language Arts</button>
    <button class="cb" data-cat="research">Research</button>
  </div>
  <div id="count"></div>
  <div id="grid-wrap">
    <div id="grid"></div>
    <div id="no-res">No resources found.</div>
  </div>
</div>

<!-- PLAYER VIEW -->
<div id="v-player">
  <div id="p-bar">
    <button id="p-back" onclick="goHome()">&#8592; Back</button>
    <div id="p-title">Loading...</div>
    <button id="p-fs" onclick="goFS()">&#x26F6; Fullscreen</button>
  </div>
  <div id="p-wrap">
    <div id="p-load">
      <div class="ring"></div>
      <div id="p-stat">Loading...</div>
    </div>
    <iframe id="viewFrame" allow="fullscreen;autoplay;clipboard-write" allowfullscreen></iframe>
  </div>
</div>

<!-- WEB EXPLORER VIEW -->
<div id="v-search">
  <div id="s2-bar">
    <button id="s2-back" onclick="goHome()">&#8592; Dashboard</button>
    <input id="s2-input" type="text" placeholder="Search anything..." autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
    <button id="s2-go" onclick="doSearch()">Go</button>
  </div>
  <div id="s2-wrap">
    <div id="s2-hint">
      <div style="font-size:2rem;opacity:.15">&#128269;</div>
      <div>Type a query above and press Go</div>
      <div style="font-size:.7rem;color:#2a2a2a">Searches routed privately through this site</div>
    </div>
    <iframe id="s2-frame" allow="fullscreen" allowfullscreen></iframe>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="s-overlay">
  <div id="s-box">
    <h2>&#9881; Settings</h2>
    <div class="s-row">
      <label>Browser Tab Name</label>
      <input type="text" id="s-title" placeholder="e.g. Google Classroom">
      <div class="s-hint">What shows in the browser tab</div>
    </div>
    <div class="s-row">
      <label>URL Cloak</label>
      <div class="s-toggle">
        <input type="checkbox" id="s-cloak">
        <span>Always keep <code style="color:#e85d20">/?mountainbike</code> in the URL</span>
      </div>
      <div class="s-hint">Bypasses filters that block the plain URL</div>
    </div>
    <div class="s-row">
      <label>Custom Cloak Suffix</label>
      <input type="text" id="s-suffix" placeholder="mountainbike">
      <div class="s-hint">The text after /? in the URL</div>
    </div>
    <div class="s-btns">
      <button id="s-cancel" onclick="closeSettings()">Cancel</button>
      <button id="s-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
var CAT={math:'Math',science:'Science',social:'Social Studies',health:'Health & PE',language:'Language Arts',research:'Research'};
var allItems=[],activeCat='all',searchVal='';
var frame=document.getElementById('viewFrame');
var s2Frame=document.getElementById('s2-frame');
var pLoad=document.getElementById('p-load');
var pStat=document.getElementById('p-stat');

/* settings + cloak */
function loadSettings(){
  document.title=localStorage.getItem('pex_title')||'PexSite';
  if(localStorage.getItem('pex_cloak')==='1'){
    var s=localStorage.getItem('pex_suffix')||'mountainbike';
    if(location.search!=='?'+s)history.replaceState(null,'','/?'+s);
  }
}
loadSettings();

function openSettings(){
  document.getElementById('s-title').value=localStorage.getItem('pex_title')||'';
  document.getElementById('s-cloak').checked=localStorage.getItem('pex_cloak')==='1';
  document.getElementById('s-suffix').value=localStorage.getItem('pex_suffix')||'mountainbike';
  document.getElementById('s-overlay').classList.add('on');
}
function closeSettings(){document.getElementById('s-overlay').classList.remove('on');}
function saveSettings(){
  var t=document.getElementById('s-title').value.trim()||'PexSite';
  var c=document.getElementById('s-cloak').checked;
  var s=document.getElementById('s-suffix').value.trim()||'mountainbike';
  localStorage.setItem('pex_title',t);
  localStorage.setItem('pex_cloak',c?'1':'0');
  localStorage.setItem('pex_suffix',s);
  document.title=t;
  if(c)history.replaceState(null,'','/?'+s);
  closeSettings();
}
document.getElementById('s-overlay').addEventListener('click',function(e){if(e.target===this)closeSettings();});

/* catalog */
fetch('/data/catalog.json').then(function(r){return r.json();}).then(function(d){allItems=d;render();});

function render(){
  var grid=document.getElementById('grid');
  var q=searchVal.toLowerCase();
  var list=allItems.filter(function(g){
    return(activeCat==='all'||g.category===activeCat)&&
      (!q||g.title.toLowerCase().indexOf(q)>-1||(g.tags&&g.tags.some(function(t){return t.indexOf(q)>-1;})));
  });
  document.getElementById('count').textContent=list.length+' resource'+(list.length!==1?'s':'');
  document.getElementById('no-res').style.display=list.length?'none':'block';
  grid.innerHTML='';
  var f=document.createDocumentFragment();
  list.forEach(function(g){
    var c=document.createElement('div');
    c.className='card';
    c.innerHTML='<div class="t">'+esc(g.title)+'</div><div class="c">'+(CAT[g.category]||g.category)+'</div>';
    c.addEventListener('click',function(){openItem(g);});
    f.appendChild(c);
  });
  grid.appendChild(f);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('search').addEventListener('input',function(){searchVal=this.value;render();});
document.getElementById('cat-bar').addEventListener('click',function(e){
  var b=e.target.closest('.cb');if(!b)return;
  document.querySelectorAll('.cb').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');activeCat=b.dataset.cat;render();
});

/* views */
function openItem(g){
  document.getElementById('v-grid').style.display='none';
  document.getElementById('v-player').style.display='flex';
  document.getElementById('p-title').textContent=g.title;
  pLoad.classList.remove('off');
  pStat.textContent='Loading...';
  frame.src=g.embed||('/p/play/'+g.id);
}
function goHome(){
  frame.src='about:blank';
  s2Frame.src='about:blank';
  document.getElementById('v-player').style.display='none';
  document.getElementById('v-search').style.display='none';
  document.getElementById('v-grid').style.display='flex';
}
function goSearch(){
  document.getElementById('v-grid').style.display='none';
  document.getElementById('v-player').style.display='none';
  document.getElementById('v-search').style.display='flex';
  setTimeout(function(){document.getElementById('s2-input').focus();},50);
}
function doSearch(){
  var q=document.getElementById('s2-input').value.trim();
  if(!q)return;
  document.getElementById('s2-hint').classList.add('off');
  s2Frame.src='/ddg/html/?q='+encodeURIComponent(q)+'&kl=us-en&kp=-2';
}

frame.addEventListener('load',function(){pLoad.classList.add('off');});

function goFS(){
  var w=document.getElementById('p-wrap');
  if(w.requestFullscreen)w.requestFullscreen();
  else if(w.webkitRequestFullscreen)w.webkitRequestFullscreen();
}
</script>
</body>
</html>
